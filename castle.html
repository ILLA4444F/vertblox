<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTBLOX: Castle Defense 3D</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .GameContainerBox { border: 1px solid #7795bd; background-color: #f6f9fc; padding: 10px; text-align: center; }
        .GameHeader { font-size: 18px; font-weight: bold; color: #002277; text-align: left; }
        .CanvasWrapper { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        canvas { background-color: #1a1c23; border: 3px solid #002277; display: block; width: 100%; height: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.4); cursor: crosshair; }
        .ControlsHelp { margin-top: 10px; font-size: 11px; background-color: #fff; padding: 6px; border: 1px dashed #7795bd; display: inline-block; }
        .BackBtn { margin-top: 15px; display: inline-block; background: #e1ebf5 linear-gradient(to bottom, #ffffff, #cedbe8); border: 1px solid #7795bd; color: #002277; padding: 6px 15px; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
<div id="Container">
    <div id="Header">
        <a href="index.html" class="LogoContainer"><span class="LogoText">VERTBLOX</span></a>
        <div class="AuthStatus">Logged in as: <a href="avatar.html">4444_F</a></div>
    </div>
    <div id="NavigationBar">
        <a href="index.html">Home</a>
        <a href="games.html" class="active">Games</a>
    </div>
    <div id="MainBody">
        <div id="RightColumn" style="width: 100%;">
            <div class="GameContainerBox">
                <div class="GameHeader">Castle Defense 3D: Save Yourself!</div>
                <div class="CanvasWrapper">
                    <canvas id="gameCanvas" width="600" height="400"></canvas>
                </div>
                <div class="ControlsHelp">
                    <strong>Управление:</strong> Клавиатура (W, A, S, D / стрелочки) — бегать по 3D-площадке замка.<br>
                    <strong>СТРЕЛЬБА:</strong> Кликай мышкой в любую точку, чтобы запустить 3D-лазер в монстров! Зомби наносят урон <b>ТЕБЕ</b>!
                </div>
                <br>
                <a href="games.html" class="BackBtn">← К списку игр</a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Настройки игрока в 3D пространстве (X, Y - плоскость пола, Z - высота подпрыгивания)
    const player = {
        x: 300, y: 250, z: 0,
        radius: 12, height: 40,
        vx: 0, vy: 0, vz: 0,
        speed: 3, hp: 100
    };

    const gravity = 0.3;
    let monsters = [];
    let lasers = [];
    let score = 0;
    let gameOver = false;
    let spawnTimer = 0;

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    canvas.addEventListener('mousedown', (e) => {
        if (gameOver) { resetGame(); return; }
        shoot(e);
    });

    function shoot(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        // Направление выстрела в изометрии
        const angle = Math.atan2(clickY - (player.y - player.z - 20), clickX - player.x);
        lasers.push({
            x: player.x,
            y: player.y,
            z: 20,
            vx: Math.cos(angle) * 7,
            vy: Math.sin(angle) * 7,
            vz: 0
        });
    }

    function spawnZombie() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 300; // Спавнятся за пределами видимости на арене
        monsters.push({
            x: player.x + Math.cos(angle) * dist,
            y: player.y + Math.sin(angle) * dist,
            speed: 1.2 + Math.random() * 0.8,
            radius: 10,
            hp: 1
        });
    }

    function resetGame() {
        player.x = 300; player.y = 250; player.z = 0;
        player.hp = 100; score = 0;
        monsters = []; lasers = [];
        gameOver = false;
    }

    // Проекция 3D координат на 2D экран (Изометрия)
    function project(x, y, z) {
        return {
            screenX: x,
            screenY: y - z
        };
    }

    function update() {
        if (gameOver) return;

        // Перемещение игрока по осям X и Y
        let dx = 0; let dy = 0;
        if (keys['w'] || keys['arrowup']) dy = -player.speed;
        if (keys['s'] || keys['arrowdown']) dy = player.speed;
        if (keys['a'] || keys['arrowleft']) dx = -player.speed;
        if (keys['d'] || keys['arrowright']) dx = player.speed;

        player.x += dx;
        player.y += dy;

        // Прыжок
        if (keys[' '] && player.z === 0) {
            player.vz = 6;
        }
        player.z += player.vz;
        if (player.z > 0) {
            player.vz -= gravity;
        } else {
            player.z = 0;
            player.vz = 0;
        }

        // Ограничения арены (Крыша башни замка)
        const distFromCenter = Math.sqrt((player.x - 300) ** 2 + (player.y - 250) ** 2);
        if (distFromCenter > 160) {
            const angle = Math.atan2(player.y - 250, player.x - 300);
            player.x = 300 + Math.cos(angle) * 160;
            player.y = 250 + Math.sin(angle) * 160;
        }

        // Движение лазеров
        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            l.x += l.vx;
            l.y += l.vy;
            if (Math.sqrt((l.x - 300) ** 2 + (l.y - 250) ** 2) > 400) {
                lasers.splice(i, 1);
            }
        }

        // Появление и логика зомби
        spawnTimer++;
        if (spawnTimer > 80) {
            spawnZombie();
            spawnTimer = 0;
        }

        for (let i = monsters.length - 1; i >= 0; i--) {
            let m = monsters[i];
            const angle = Math.atan2(player.y - m.y, player.x - m.x);
            m.x += Math.cos(angle) * m.speed;
            m.y += Math.sin(angle) * m.speed;

            // Зомби бьет ИГРОКА!
            const distToPlayer = Math.sqrt((m.x - player.x) ** 2 + (m.y - player.y) ** 2);
            if (distToPlayer < player.radius + m.radius && player.z < 15) {
                player.hp -= 0.4; // Наносит урон
                if (player.hp <= 0) {
                    player.hp = 0;
                    gameOver = true;
                }
            }

            // Столкновение лазера с зомби
            for (let j = lasers.length - 1; j >= 0; j--) {
                let l = lasers[j];
                const distToLaser = Math.sqrt((m.x - l.x) ** 2 + (m.y - l.y) ** 2);
                if (distToLaser < m.radius + 6) {
                    monsters.splice(i, 1);
                    lasers.splice(j, 1);
                    score += 15;
                    break;
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Задний фон неба
        ctx.fillStyle = '#0f111a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Рисуем круглую 3D платформу замка (изометрический эллипс)
        ctx.fillStyle = '#455a64';
        ctx.strokeStyle = '#37474f';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.ellipse(300, 250, 160, 100, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Линии разметки плит (псевдо-3D текстура)
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 2;
        for (let i = -150; i <= 150; i += 50) {
            ctx.beginPath();
            ctx.ellipse(300, 250, Math.abs(i), Math.abs(i) * 0.6, 0, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Принцесса сидит на высоком троне сзади
        let princessProj = project(300, 130, 0);
        ctx.fillStyle = '#ff4081'; // Розовый
        ctx.fillRect(princessProj.screenX - 8, princessProj.screenY - 30, 16, 30);
        ctx.fillStyle = '#ffe082'; // Голова
        ctx.fillRect(princessProj.screenX - 6, princessProj.screenY - 42, 12, 12);
        ctx.fillStyle = '#ffd700'; // Корона
        ctx.fillRect(princessProj.screenX - 4, princessProj.screenY - 47, 8, 5);

        // Отрисовка Лазеров
        for (let l of lasers) {
            let proj = project(l.x, l.y, l.z);
            ctx.fillStyle = '#ff0055';
            ctx.shadowColor = '#ff0055';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(proj.screenX, proj.screenY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Отрисовка Зомби (3D-цилиндры)
        // Сортируем по координате Y, чтобы ближние объекты перекрывали дальние (Z-буфер)
        let renderQueue = [];
        for (let m of monsters) {
            renderQueue.push({ type: 'zombie', y: m.y, obj: m });
        }
        renderQueue.push({ type: 'player', y: player.y, obj: player });

        renderQueue.sort((a, b) => a.y - b.y);

        for (let item of renderQueue) {
            if (item.type === 'zombie') {
                let m = item.obj;
                let proj = project(m.x, m.y, 0);
                
                // Тень зомби
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(proj.screenX, proj.screenY, 10, 5, 0, 0, Math.PI*2);
                ctx.fill();

                // Тело зомби в 3D
                ctx.fillStyle = '#1b5e20'; // Зеленый Roblox-зомби
                ctx.fillRect(proj.screenX - 8, proj.screenY - 26, 16, 20);
                ctx.fillStyle = '#81c784'; // Голова
                ctx.fillRect(proj.screenX - 6, proj.screenY - 36, 12, 10);
                ctx.fillStyle = '#ff1744'; // Глаза
                ctx.fillRect(proj.screenX - 4, proj.screenY - 33, 2, 2);
                ctx.fillRect(proj.screenX + 2, proj.screenY - 33, 2, 2);
            } else {
                // Игрок
                let p = item.obj;
                let proj = project(p.x, p.y, p.z);

                // Тень игрока на земле
                let shadowProj = project(p.x, p.y, 0);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(shadowProj.screenX, shadowProj.screenY, 12, 6, 0, 0, Math.PI*2);
                ctx.fill();

                // 3D Блочный Скин Игрока (как в классическом Roblox)
                ctx.fillStyle = '#1565c0'; // Синие штаны
                ctx.fillRect(proj.screenX - 8, proj.screenY - 12, 16, 12);
                ctx.fillStyle = '#d02020'; // Красный торс
                ctx.fillRect(proj.screenX - 10, proj.screenY - 30, 20, 18);
                ctx.fillStyle = '#fcd303'; // Желтая голова
                ctx.fillRect(proj.screenX - 6, proj.screenY - 42, 12, 12);
                
                // Лицо
                ctx.fillStyle = '#000';
                ctx.fillRect(proj.screenX - 4, proj.screenY - 38, 2, 2);
                ctx.fillRect(proj.screenX + 2, proj.screenY - 38, 2, 2);
            }
        }

        // Интерфейс
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Arial';
        ctx.fillText('Your Score: ' + score + ' VB', 15, 25);

        // ХП Игрока
        ctx.fillText('YOUR HEALTH:', 400, 25);
        ctx.fillStyle = '#ff1744';
        ctx.fillRect(500, 15, 80, 12);
        ctx.fillStyle = '#00e676';
        ctx.fillRect(500, 15, 80 * (player.hp / 100), 12);

        if (gameOver) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff1744';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('YOU DIED!', canvas.width / 2, canvas.height / 2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.fillText('Final Score: ' + score + ' VB', canvas.width / 2, canvas.height / 2 + 25);
            ctx.fillText('Click anywhere to respawn', canvas.width / 2, canvas.height / 2 + 55);
            ctx.textAlign = 'left';
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
});
</script>
</body>
</html>
