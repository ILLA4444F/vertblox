<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTBLOX: Domestos Birds</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .GameContainerBox { border: 1px solid #7795bd; background-color: #f6f9fc; padding: 10px; text-align: center; }
        .GameHeader { font-size: 18px; font-weight: bold; color: #002277; text-align: left; }
        .CanvasWrapper { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        canvas { background-color: #bbdefb; border: 3px solid #002277; display: block; width: 100%; height: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.4); cursor: grab; }
        canvas:active { cursor: grabbing; }
        .ControlsHelp { margin-top: 10px; font-size: 11px; background-color: #fff; padding: 6px; border: 1px dashed #7795bd; display: inline-block; }
        .BackBtn { margin-top: 15px; display: inline-block; background: #e1ebf5 linear-gradient(to bottom, #ffffff, #cedbe8); border: 1px solid #7795bd; color: #002277; padding: 6px 15px; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
<div id="Container">
    <div id="Header">
        <a href="index.html" class="LogoContainer"><span class="LogoText">VERTBLOX</span></a>
        <div class="AuthStatus">Logged in as: <a href="avatar.html">4444_F</a></div>
    </div>
    <div id="NavigationBar">
        <a href="index.html">Home</a>
        <a href="games.html" class="active">Games</a>
    </div>
    <div id="MainBody">
        <div id="RightColumn" style="width: 100%;">
            <div class="GameContainerBox">
                <div class="GameHeader">Domestos Birds</div>
                <div class="CanvasWrapper">
                    <canvas id="angryCanvas" width="600" height="350"></canvas>
                </div>
                <div class="ControlsHelp">
                    <strong>Управление:</strong> Зажми левую кнопку мыши на синей бутылке Доместоса в рогатке, <b>потяни назад</b> и отпусти для выстрела! Уничтожь все какашки!
                </div>
                <br>
                <a href="games.html" class="BackBtn">← К списку игр</a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('angryCanvas');
    const ctx = canvas.getContext('2d');

    const sling = { x: 100, y: 240 }; // Координаты рогатки
    let bird = { x: 100, y: 240, rx: 100, ry: 240, vx: 0, vy: 0, radius: 12, isFlying: false, isDragging: false };
    
    // Блоки защиты какашек
    let blocks = [
        { x: 420, y: 220, w: 20, h: 80, active: true },
        { x: 480, y: 220, w: 20, h: 80, active: true },
        { x: 410, y: 200, w: 100, h: 20, active: true }
    ];

    // Коварные какашки (свинки)
    let targets = [
        { x: 450, y: 270, radius: 14, active: true },
        { x: 450, y: 175, radius: 12, active: true }
    ];

    let score = 0;
    const gravity = 0.25;

    // Слушатели мыши / тача
    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', drag);
    canvas.addEventListener('mouseup', release);

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDrag(e) {
        if (bird.isFlying) return;
        const pos = getMousePos(e);
        const dist = Math.sqrt((pos.x - bird.x)**2 + (pos.y - bird.y)**2);
        if (dist < 30) {
            bird.isDragging = true;
        }
    }

    function drag(e) {
        if (!bird.isDragging) return;
        const pos = getMousePos(e);
        
        // Ограничение длины натяжения рогатки
        const dist = Math.sqrt((pos.x - sling.x)**2 + (pos.y - sling.y)**2);
        if (dist < 60) {
            bird.x = pos.x;
            bird.y = pos.y;
        } else {
            const angle = Math.atan2(pos.y - sling.y, pos.x - sling.x);
            bird.x = sling.x + Math.cos(angle) * 60;
            bird.y = sling.y + Math.sin(angle) * 60;
        }
    }

    function release() {
        if (!bird.isDragging) return;
        bird.isDragging = false;
        bird.isFlying = true;

        // Расчет вектора силы выстрела
        bird.vx = (sling.x - bird.x) * 0.16;
        bird.vy = (sling.y - bird.y) * 0.16;
    }

    function resetBird() {
        bird.x = sling.x;
        bird.y = sling.y;
        bird.vx = 0;
        bird.vy = 0;
        bird.isFlying = false;
    }

    function checkCollisions() {
        if (!bird.isFlying) return;

        // Физика столкновения с блоками
        for (let b of blocks) {
            if (!b.active) continue;
            if (bird.x + bird.radius > b.x && bird.x - bird.radius < b.x + b.w &&
                bird.y + bird.radius > b.y && bird.y - bird.radius < b.y + b.h) {
                b.active = false; // Ломаем блок при ударе
                score += 50;
            }
        }

        // Столкновение с какашками
        for (let t of targets) {
            if (!t.active) continue;
            const dist = Math.sqrt((bird.x - t.x)**2 + (bird.y - t.y)**2);
            if (dist < bird.radius + t.radius) {
                t.active = false; // Уничтожаем цель!
                score += 100;
            }
        }
    }

    function update() {
        if (bird.isFlying) {
            bird.x += bird.vx;
            bird.y += bird.vy;
            bird.vy += gravity; // Гравитация тянет вниз

            checkCollisions();

            // Если упал на землю или улетел за экран - респавн птицы
            if (bird.y > 300 || bird.x > 600) {
                resetBird();
            }
        }

        // Проверка победы (все цели сбиты)
        const won = targets.every(t => !t.active);
        if (won) {
            // Воскрешаем заново через 2 секунды
            setTimeout(() => {
                targets.forEach(t => t.active = true);
                blocks.forEach(b => b.active = true);
                resetBird();
            }, 2000);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Горы на фоне
        ctx.fillStyle = '#90caf9';
        ctx.beginPath();
        ctx.moveTo(0, 300); ctx.lineTo(150, 150); ctx.lineTo(300, 300); ctx.fill();

        // Земля и травка
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, 300, 600, 50);

        // Рогатка
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(sling.x, sling.y);
        ctx.lineTo(sling.x - 10, sling.y + 60);
        ctx.moveTo(sling.x, sling.y);
        ctx.lineTo(sling.x + 15, sling.y + 60);
        ctx.stroke();

        // Тянущаяся резинка рогатки
        if (bird.isDragging) {
            ctx.strokeStyle = '#e65100';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(sling.x - 10, sling.y + 10);
            ctx.lineTo(bird.x, bird.y);
            ctx.lineTo(sling.x + 10, sling.y + 10);
            ctx.stroke();
        }

        // Доместос (наша птичка) - оформлен в виде фирменной синей бутылки с красной крышкой
        ctx.save();
        ctx.translate(bird.x, bird.y);
        
        // Синий флакон
        ctx.fillStyle = '#0d47a1';
        ctx.fillRect(-10, -8, 20, 22);
        // Белая этикетка
        ctx.fillStyle = '#fff';
        ctx.fillRect(-8, -2, 16, 12);
        ctx.fillStyle = '#d50000';
        ctx.font = 'bold 5px Arial';
        ctx.fillText('DOM', -7, 6);
        // Красный носик (изогнутая крышка)
        ctx.fillStyle = '#d50000';
        ctx.fillRect(-5, -14, 10, 6);

        ctx.restore();

        // Защитные блоки (дерево/камень)
        for (let b of blocks) {
            if (!b.active) continue;
            ctx.fillStyle = '#b0bec5';
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = '#37474f';
            ctx.lineWidth = 2;
            ctx.strokeRect(b.x, b.y, b.w, b.h);
        }

        // Какашки (цели) - коричневый завиток с глазками
        for (let t of targets) {
            if (!t.active) continue;
            ctx.save();
            ctx.translate(t.x, t.y);

            // Коричневая основа какашки
            ctx.fillStyle = '#8d6e63';
            ctx.beginPath();
            ctx.arc(0, 4, t.radius, 0, Math.PI * 2);
            ctx.arc(0, -4, t.radius - 3, 0, Math.PI * 2);
            ctx.fill();

            // Глазки
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-4, -1, 3, 0, Math.PI*2);
            ctx.arc(4, -1, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-4, -1, 1, 0, Math.PI*2);
            ctx.arc(4, -1, 1, 0, Math.PI*2);
            ctx.fill();

            // Рот (испуганный)
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 6, 3, 0, Math.PI, true);
            ctx.stroke();

            ctx.restore();
        }

        // Текст очков
        ctx.fillStyle = '#000';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('Score: ' + score, 15, 25);

        // Проверка на победу (если все убиты)
        if (targets.every(t => !t.active)) {
            ctx.fillStyle = '#2e7d32';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('CLEANED UP! NEXT ROUND...', 150, 180);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
});
</script>
</body>
</html>
