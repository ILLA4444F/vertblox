<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VERTBLOX: Domestos Birds</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { touch-action: none; }
        .GameContainerBox { border: 1px solid #7795bd; background-color: #f6f9fc; padding: 10px; text-align: center; }
        .GameHeader { font-size: 18px; font-weight: bold; color: #002277; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .CanvasWrapper { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #bbdefb; }
        canvas { background-color: #bbdefb; border: 3px solid #002277; display: block; width: 100%; height: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.4); cursor: grab; }
        
        .FullscreenBtn { background: #002277; color: white; border: none; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 3px; }
        
        .BoostsPanel { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .BoostBtn { padding: 8px 12px; font-size: 11px; font-weight: bold; color: white; border: 2px solid #000; border-radius: 5px; cursor: pointer; box-shadow: 0 3px 0 #000; }
        .BoostBtn:active { transform: translateY(2px); box-shadow: none; }
        #boostSpeed { background-color: #ff1744; }
        #boostTriple { background-color: #aa00ff; }
        #boostBomb { background-color: #ffea00; color: #000; }

        .ControlsHelp { margin-top: 10px; font-size: 11px; background-color: #fff; padding: 6px; border: 1px dashed #7795bd; display: inline-block; }
        .BackBtn { margin-top: 15px; display: inline-block; background: #e1ebf5 linear-gradient(to bottom, #ffffff, #cedbe8); border: 1px solid #7795bd; color: #002277; padding: 6px 15px; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
<div id="Container">
    <div id="Header">
        <a href="index.html" class="LogoContainer"><span class="LogoText">VERTBLOX</span></a>
        <div class="AuthStatus">Logged in as: <a href="avatar.html">4444_F</a></div>
    </div>
    <div id="MainBody">
        <div class="GameContainerBox">
            <div class="GameHeader">
                <span>Domestos Birds (4 Попытки)</span>
                <button class="FullscreenBtn" onclick="toggleFullscreen()">🖥️ Fullscreen</button>
            </div>
            
            <div class="CanvasWrapper" id="gameArea">
                <canvas id="angryCanvas" width="600" height="350"></canvas>
            </div>

            <div class="BoostsPanel">
                <button class="BoostBtn" id="boostSpeed">⚡ SPEED (x2 Скорость)</button>
                <button class="BoostBtn" id="boostTriple">🔮 TRIPLE (Раздвоение)</button>
                <button class="BoostBtn" id="boostBomb">💣 BOMB (Взрывной)</button>
            </div>

            <div class="ControlsHelp">
                <strong>У вас ровно 4 птицы (попытки).</strong> Используй бусты, чтобы снести все цели до того, как патроны закончатся!
            </div>
            <br>
            <a href="games.html" class="BackBtn">← К списку игр</a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('angryCanvas');
    const ctx = canvas.getContext('2d');

    const sling = { x: 100, y: 240 };
    
    let birds = [{ x: 100, y: 240, vx: 0, vy: 0, radius: 12, isFlying: false, isDragging: false, active: true }];
    let livesLeft = 4; // 4 Птицы на раунд!

    let blocks = [
        { x: 420, y: 220, w: 20, h: 80, active: true },
        { x: 480, y: 220, w: 20, h: 80, active: true },
        { x: 410, y: 200, w: 100, h: 20, active: true }
    ];

    let targets = [
        { x: 450, y: 270, radius: 14, active: true },
        { x: 450, y: 175, radius: 12, active: true }
    ];

    let score = 0;
    const gravity = 0.25;
    let currentMenu = 'start';
    let activeBoost = null;

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleDrag);
    canvas.addEventListener('mouseup', handleRelease);

    canvas.addEventListener('touchstart', (e) => { handleStart(e.touches[0]); }, { passive: true });
    canvas.addEventListener('touchmove', (e) => { handleDrag(e.touches[0]); }, { passive: true });
    canvas.addEventListener('touchend', handleRelease, { passive: true });

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function handleStart(e) {
        const pos = getMousePos(e);
        if (currentMenu === 'start') {
            if (pos.x > 220 && pos.x < 380 && pos.y > 150 && pos.y < 210) {
                currentMenu = 'playing';
            }
            return;
        }

        let mainBird = birds[0];
        if (mainBird && !mainBird.isFlying && livesLeft > 0) {
            const dist = Math.sqrt((pos.x - mainBird.x)**2 + (pos.y - mainBird.y)**2);
            if (dist < 35) mainBird.isDragging = true;
        }
    }

    function handleDrag(e) {
        if (currentMenu !== 'playing') return;
        let mainBird = birds[0];
        if (!mainBird || !mainBird.isDragging) return;
        
        const pos = getMousePos(e);
        const dist = Math.sqrt((pos.x - sling.x)**2 + (pos.y - sling.y)**2);
        
        if (dist < 65) {
            mainBird.x = pos.x;
            mainBird.y = pos.y;
        } else {
            const angle = Math.atan2(pos.y - sling.y, pos.x - sling.x);
            mainBird.x = sling.x + Math.cos(angle) * 65;
            mainBird.y = sling.y + Math.sin(angle) * 65;
        }
    }

    function handleRelease() {
        let mainBird = birds[0];
        if (!mainBird || !mainBird.isDragging) return;
        mainBird.isDragging = false;
        mainBird.isFlying = true;

        mainBird.vx = (sling.x - mainBird.x) * 0.16;
        mainBird.vy = (sling.y - mainBird.y) * 0.16;

        if (activeBoost === 'speed') {
            mainBird.vx *= 1.8;
            mainBird.vy *= 1.8;
            activeBoost = null;
        }
        
        livesLeft--; // Тратим одну птицу!
    }

    document.getElementById('boostSpeed').addEventListener('click', () => { activeBoost = 'speed'; });
    document.getElementById('boostTriple').addEventListener('click', () => {
        let mainBird = birds[0];
        if (mainBird && mainBird.isFlying && birds.length === 1) {
            birds.push({ x: mainBird.x, y: mainBird.y, vx: mainBird.vx, vy: mainBird.vy - 1.5, radius: 12, isFlying: true, active: true });
            birds.push({ x: mainBird.x, y: mainBird.y, vx: mainBird.vx, vy: mainBird.vy + 1.5, radius: 12, isFlying: true, active: true });
        } else {
            activeBoost = 'triple';
        }
    });
    document.getElementById('boostBomb').addEventListener('click', () => { activeBoost = 'bomb'; });

    function resetRound() {
        birds = [{ x: sling.x, y: sling.y, vx: 0, vy: 0, radius: 12, isFlying: false, isDragging: false, active: true }];
        activeBoost = null;
    }

    function resetFullGame() {
        livesLeft = 4;
        score = 0;
        blocks.forEach(b => b.active = true);
        targets.forEach(t => t.active = true);
        resetRound();
    }

    function triggerExplosion(x, y) {
        for (let b of blocks) { if (Math.sqrt((b.x - x)**2 + (b.y - y)**2) < 80) b.active = false; }
        for (let t of targets) { if (Math.sqrt((t.x - x)**2 + (t.y - y)**2) < 80) t.active = false; }
        score += 200;
    }

    function update() {
        if (currentMenu !== 'playing') return;

        let allInactive = true;

        for (let bird of birds) {
            if (!bird.active) continue;

            if (bird.isFlying) {
                bird.x += bird.vx;
                bird.y += bird.vy;
                bird.vy += gravity;

                for (let b of blocks) {
                    if (!b.active) continue;
                    if (bird.x + bird.radius > b.x && bird.x - bird.radius < b.x + b.w &&
                        bird.y + bird.radius > b.y && bird.y - bird.radius < b.y + b.h) {
                        b.active = false;
                        score += 50;
                        if (activeBoost === 'bomb') { triggerExplosion(bird.x, bird.y); activeBoost = null; }
                    }
                }

                for (let t of targets) {
                    if (!t.active) continue;
                    const dist = Math.sqrt((bird.x - t.x)**2 + (bird.y - t.y)**2);
                    if (dist < bird.radius + t.radius) {
                        t.active = false;
                        score += 100;
                        if (activeBoost === 'bomb') { triggerExplosion(bird.x, bird.y); activeBoost = null; }
                    }
                }

                if (bird.y > 320 || bird.x > 610 || bird.x < -10) {
                    bird.active = false;
                } else {
                    allInactive = false;
                }
            } else {
                allInactive = false;
            }
        }

        // Если снаряды улетели
        if (allInactive) {
            if (targets.every(t => !t.active)) {
                // Выиграли!
                setTimeout(resetFullGame, 2000);
            } else if (livesLeft <= 0) {
                // Проиграли по патронам
                setTimeout(resetFullGame, 2000);
            } else {
                resetRound();
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentMenu === 'start') {
            ctx.fillStyle = '#0d47a1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('DOMESTOS BIRDS', canvas.width / 2, 100);
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(220, 150, 160, 60);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.fillText('START GAME', canvas.width / 2, 186);
            ctx.textAlign = 'left';
            return;
        }

        ctx.fillStyle = '#90caf9';
        ctx.beginPath(); ctx.moveTo(0, 300); ctx.lineTo(150, 150); ctx.lineTo(300, 300); ctx.fill();

        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, 300, 600, 50);

        // Рогатка
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(sling.x, sling.y); ctx.lineTo(sling.x - 10, sling.y + 60);
        ctx.moveTo(sling.x, sling.y); ctx.lineTo(sling.x + 15, sling.y + 60);
        ctx.stroke();

        let mainBird = birds[0];
        if (mainBird && mainBird.isDragging) {
            ctx.strokeStyle = '#e65100';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(sling.x - 10, sling.y + 10);
            ctx.lineTo(mainBird.x, mainBird.y);
            ctx.lineTo(sling.x + 10, sling.y + 10);
            ctx.stroke();
        }

        // Отрисовка Доместосов
        for (let bird of birds) {
            if (!bird.active) continue;
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.fillStyle = '#0d47a1';
            ctx.fillRect(-10, -8, 20, 22);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-8, -2, 16, 12);
            ctx.fillStyle = '#d50000';
            ctx.font = 'bold 5px Arial';
            ctx.fillText('DOM', -7, 6);
            ctx.fillStyle = '#d50000';
            ctx.fillRect(-5, -14, 10, 6);
            ctx.restore();
        }

        // Отрисовка оставшихся попыток (мини-птички внизу слева)
        for (let i = 0; i < livesLeft; i++) {
            ctx.fillStyle = '#0d47a1';
            ctx.fillRect(15 + i*15, 315, 10, 15);
        }

        // Блоки
        for (let b of blocks) {
            if (!b.active) continue;
            ctx.fillStyle = '#b0bec5';
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }

        // Какашки (цели)
        for (let t of targets) {
            if (!t.active) continue;
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.fillStyle = '#8d6e63';
            ctx.beginPath();
            ctx.arc(0, 4, t.radius, 0, Math.PI * 2);
            ctx.arc(0, -4, t.radius - 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        ctx.fillStyle = '#000';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('Score: ' + score, 15, 25);
        ctx.fillText('Birds left: ' + livesLeft, 15, 45);

        // Поражение
        if (livesLeft <= 0 && birds.every(b => !b.isFlying)) {
            ctx.fillStyle = '#d50000';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('OUT OF AMMO! RESTARTING...', 150, 180);
        }

        // Победа
        if (targets.every(t => !t.active)) {
            ctx.fillStyle = '#2e7d32';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('CLEANED UP! VICTORY!', 150, 180);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
});

function toggleFullscreen() {
    const gameArea = document.getElementById('gameArea');
    if (!document.fullscreenElement) {
        gameArea.requestFullscreen().catch(err => {
            alert(`Ошибка входа в полноэкранный режим: ${err.message}`);
        });
    } else {
        document.exitFullscreen();
    }
}
</script>
</body>
</html>
