<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VERTBLOX: 3D Parkour</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { touch-action: none; background-color: #e3f2fd; margin: 0; padding: 0; }
        .GameContainerBox { border: 1px solid #0d47a1; background-color: #f6f9fc; padding: 10px; text-align: center; }
        .GameHeader { font-size: 18px; font-weight: bold; color: #0d47a1; text-align: left; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .CanvasWrapper { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #90caf9; overflow: hidden; }
        canvas { background-color: #80deea; border: 3px solid #0d47a1; display: block; width: 100%; height: auto; }

        .FullscreenBtn { background: #0d47a1; color: white; border: none; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 3px; }

        /* Круговой сенсорный джойстик */
        .JoystickContainer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(13, 71, 161, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .JoystickStick {
            width: 40px;
            height: 40px;
            background: rgba(13, 71, 161, 0.8);
            border: 2px solid #fff;
            border-radius: 50%;
            touch-action: none;
        }

        /* Кнопка Прыжка */
        .JumpButton {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 75px;
            height: 75px;
            background: rgba(255, 152, 0, 0.8);
            border: 3px solid #e65100;
            border-radius: 50%;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }

        .ControlsHelp { margin-top: 10px; font-size: 11px; background-color: #fff; padding: 6px; border: 1px dashed #0d47a1; display: inline-block; }
        .BackBtn { margin-top: 15px; display: inline-block; background: #e1ebf5 linear-gradient(to bottom, #ffffff, #cedbe8); border: 1px solid #7795bd; color: #002277; padding: 6px 15px; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
<div id="Container">
    <div id="Header">
        <a href="index.html" class="LogoContainer"><span class="LogoText">VERTBLOX</span></a>
        <div class="AuthStatus">Logged in as: <a href="avatar.html">4444_F</a></div>
    </div>
    <div id="MainBody">
        <div class="GameContainerBox">
            <div class="GameHeader">
                <span>VERTBLOX 3D PARKOUR (FIXED)</span>
                <button class="FullscreenBtn" onclick="toggleFullscreen()">🖥️ Fullscreen</button>
            </div>

            <div class="CanvasWrapper" id="gameArea">
                <canvas id="parkourCanvas" width="500" height="350"></canvas>
                
                <div class="JoystickContainer" id="joystick">
                    <div class="JoystickStick" id="stick"></div>
                </div>

                <div class="JumpButton" id="jumpBtn">JUMP</div>
            </div>

            <div class="ControlsHelp">
                <strong>Управление:</strong> Стик на экране (или WASD / Стрелочки на клавиатуре) — движение.<br>
                Кнопка JUMP (или Пробел на ПК) — прыжок. Доберись до верхнего золотого блока!
            </div>
            <br>
            <a href="games.html" class="BackBtn">← К списку игр</a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const canvas = document.getElementById('parkourCanvas');
    const ctx = canvas.getContext('2d');

    // Настройки физики игры
    const player = {
        x: 230,
        y: 280, // Физическая позиция на экране
        vx: 0,
        vy: 0,
        width: 20,
        height: 20,
        speed: 3.5,
        gravity: 0.35,
        jumpForce: -7.5,
        onGround: false
    };

    // Плавное слежение камеры по вертикали
    let cameraY = 0;

    // Платформы (X, Y, Ширина, Высота, Цвет, Тип)
    const platforms = [
        { x: 150, y: 310, w: 200, h: 20, color: '#8d6e63', isFinish: false }, // Старт
        { x: 120, y: 250, w: 80,  h: 15, color: '#4caf50', isFinish: false },
        { x: 260, y: 200, w: 80,  h: 15, color: '#2196f3', isFinish: false },
        { x: 160, y: 140, w: 70,  h: 15, color: '#9c27b0', isFinish: false },
        { x: 270, y: 80,  w: 80,  h: 15, color: '#e91e63', isFinish: false },
        { x: 140, y: 20,  w: 80,  h: 15, color: '#ff9800', isFinish: false },
        { x: 220, y: -40, w: 60,  h: 15, color: '#ffd700', isFinish: true }   // Финиш (Золотой)
    ];

    let keys = {};
    let isWon = false;

    // Сенсорный джойстик
    const joystick = document.getElementById('joystick');
    const stick = document.getElementById('stick');
    let joyX = 0, joyY = 0;
    let isJoyActive = false;

    joystick.addEventListener('touchstart', (e) => { 
        isJoyActive = true; 
        moveStick(e.touches[0]); 
    }, { passive: true });

    window.addEventListener('touchmove', (e) => { 
        if (isJoyActive) moveStick(e.touches[0]); 
    }, { passive: true });

    window.addEventListener('touchend', () => {
        isJoyActive = false;
        stick.style.transform = 'translate(0px, 0px)';
        joyX = 0; joyY = 0;
    });

    function moveStick(touch) {
        const rect = joystick.getBoundingClientRect();
        const cX = rect.left + rect.width / 2;
        const cY = rect.top + rect.height / 2;
        let dx = touch.clientX - cX;
        let dy = touch.clientY - cY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxD = 40;

        if (dist > maxD) { 
            dx = (dx / dist) * maxD; 
            dy = (dy / dist) * maxD; 
        }
        stick.style.transform = `translate(${dx}px, ${dy}px)`;
        joyX = dx / maxD;
        joyY = dy / maxD;
    }

    // Обработка кнопки прыжка
    const jumpBtn = document.getElementById('jumpBtn');
    jumpBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        triggerJump();
    }, { passive: false });

    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        if (e.key === ' ' || e.key === 'arrowup') triggerJump(); 
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function triggerJump() {
        if (player.onGround) {
            player.vy = player.jumpForce;
            player.onGround = false;
        }
        if (isWon) resetGame();
    }

    function resetGame() {
        player.x = 230;
        player.y = 280;
        player.vx = 0;
        player.vy = 0;
        player.onGround = false;
        cameraY = 0;
        isWon = false;
    }

    function update() {
        if (isWon) return;

        // 1. Движение по оси X (Клавиатура + Джойстик)
        let moveX = 0;
        if (keys['a'] || keys['arrowleft']) moveX = -player.speed;
        if (keys['d'] || keys['arrowright']) moveX = player.speed;
        
        if (isJoyActive) {
            moveX = joyX * player.speed;
        }

        player.x += moveX;

        // Не даем вылететь за края экрана по горизонтали
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

        // 2. Гравитация и движение по оси Y
        player.vy += player.gravity;
        player.y += player.vy;

        // 3. Коллизии с платформами
        player.onGround = false;
        
        // Падаем вниз? Только тогда проверяем приземление
        if (player.vy >= 0) {
            for (let plat of platforms) {
                if (player.x + player.width > plat.x && 
                    player.x < plat.x + plat.w &&
                    player.y + player.height >= plat.y && 
                    player.y + player.height - player.vy <= plat.y + 8) {
                    
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.onGround = true;

                    if (plat.isFinish) {
                        isWon = true;
                    }
                    break;
                }
            }
        }

        // 4. Падение в пропасть (если упал ниже текущего экрана камеры)
        if (player.y > canvas.height + cameraY + 100) {
            resetGame();
        }

        // 5. Плавный скролл камеры вверх за игроком
        let targetCameraY = player.y - 180;
        if (targetCameraY < cameraY) {
            cameraY += (targetCameraY - cameraY) * 0.1; // Плавное движение
        } else if (cameraY < 0 && player.y > 200) {
            // Возвращаем камеру назад, если игрок падает, но еще жив
            cameraY += (targetCameraY - cameraY) * 0.05;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // Смещаем весь мир на значение скролла камеры
        ctx.translate(0, -cameraY);

        // Рисуем задний план в зависимости от высоты (эффект неба)
        let grad = ctx.createLinearGradient(0, -500, 0, 350);
        grad.addColorStop(0, '#0d47a1'); // Космос наверху
        grad.addColorStop(0.5, '#4fc3f7'); // Дневное небо
        grad.addColorStop(1, '#80deea'); // Бирюзовый низ
        ctx.fillStyle = grad;
        ctx.fillRect(0, -600, canvas.width, canvas.height + 1000);

        // Декоративное солнце/луна
        ctx.fillStyle = '#fff9c4';
        ctx.beginPath(); 
        ctx.arc(380, 50, 25, 0, Math.PI*2); 
        ctx.fill();

        // 1. Отрисовка платформ (с 3D-объемом)
        platforms.forEach(plat => {
            // Тень платформы (чуть ниже)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(plat.x + 4, plat.y + 4, plat.w, plat.h);

            // Боковая 3D-грань
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(plat.x, plat.y + 4, plat.w, plat.h);

            // Лицевая сторона платформы
            ctx.fillStyle = plat.color;
            ctx.fillRect(plat.x, plat.y, plat.w, plat.h - 4);

            // Световой блик сверху платформы
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(plat.x, plat.y, plat.w, 2);
        });

        // 2. Отрисовка игрока (3D-кубик)
        // Тень под кубиком на текущей платформе (если он близко к земле)
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(player.x + 2, player.y + player.height - 2, player.width - 4, 4);

        // Боковые темные грани куба для объема
        ctx.fillStyle = '#b71c1c'; 
        ctx.fillRect(player.x, player.y + 4, player.width, player.height - 4);

        // Передняя часть кубика (светлая)
        ctx.fillStyle = '#ff1744';
        ctx.fillRect(player.x, player.y, player.width, player.height - 4);

        // "Лицо" или блик кубика
        ctx.fillStyle = '#ffd54f';
        ctx.fillRect(player.x + 4, player.y + 4, 4, 4);
        ctx.fillRect(player.x + 12, player.y + 4, 4, 4);

        ctx.restore();

        // Статический интерфейс (поверх камеры)
        if (isWon) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('PARKOUR MASTER!', canvas.width / 2, canvas.height / 2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.fillText('Ты покорил вершину VERTBLOX!', canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Нажми JUMP или Пробел для перезапуска', canvas.width / 2, canvas.height / 2 + 45);
            ctx.textAlign = 'left';
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    loop();
});

function toggleFullscreen() {
    const gameArea = document.getElementById('gameArea');
    if (!document.fullscreenElement) {
        gameArea.requestFullscreen().catch(err => {
            alert(`Ошибка входа в полноэкранный режим: ${err.message}`);
        });
    } else {
        document.exitFullscreen();
    }
}
</script>
</body>
</html>
